<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Impulsion</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            max-width: 420px;
            margin: 80px auto;
            padding: 40px 32px;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
        }
        .login-container h1 {
            font-size: 1.3rem;
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 8px;
        }
        .login-subtitle {
            text-align: center;
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 28px;
        }
        .login-field {
            margin-bottom: 16px;
        }
        .login-field label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 6px;
        }
        .login-field input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        .login-field input:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s;
            margin-top: 8px;
        }
        .login-btn:hover {
            background: var(--primary-dark);
        }
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .login-error {
            display: none;
            padding: 10px 14px;
            background: #fee2e2;
            border: 1px solid #fca5a5;
            border-radius: 6px;
            color: #991b1b;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 20px;
        }
        .login-logo img {
            max-width: 180px;
            height: auto;
        }
        .login-success {
            display: none;
            padding: 10px 14px;
            background: #d1fae5;
            border: 1px solid #6ee7b7;
            border-radius: 6px;
            color: #065f46;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }
        .login-toggle {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-light);
        }
        .login-toggle a {
            color: var(--primary-color);
            font-weight: 600;
            text-decoration: none;
        }
        .login-toggle a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-container">
            <div class="login-logo">
                <img src="https://www.transitionspro-paca.fr/wp-content/uploads/2021/04/logo-transitions-pro-paca.png"
                     alt="Transitions Pro PACA">
            </div>
            <h1>Impulsion</h1>
            <p class="login-subtitle" id="login-subtitle">Connectez-vous pour acceder a l'outil</p>

            <div class="login-error" id="login-error"></div>
            <div class="login-success" id="login-success"></div>

            <!-- Formulaire connexion -->
            <form id="login-form">
                <div class="login-field">
                    <label for="login-email">Adresse e-mail</label>
                    <input type="email" id="login-email" placeholder="votre.email@transitionspro-paca.fr" required autofocus>
                </div>
                <div class="login-field">
                    <label for="login-password">Mot de passe</label>
                    <input type="password" id="login-password" placeholder="Votre mot de passe" required>
                </div>
                <button type="submit" class="login-btn" id="login-submit">Se connecter</button>
            </form>

            <!-- Formulaire inscription -->
            <form id="signup-form" style="display:none;">
                <div class="login-field">
                    <label for="signup-nom">Nom complet</label>
                    <input type="text" id="signup-nom" placeholder="Prenom Nom" required>
                </div>
                <div class="login-field">
                    <label for="signup-email">Adresse e-mail</label>
                    <input type="email" id="signup-email" placeholder="votre.email@transitionspro-paca.fr" required>
                </div>
                <div class="login-field">
                    <label for="signup-password">Mot de passe</label>
                    <input type="password" id="signup-password" placeholder="Minimum 6 caracteres" required minlength="6">
                </div>
                <div class="login-field">
                    <label for="signup-password-confirm">Confirmer le mot de passe</label>
                    <input type="password" id="signup-password-confirm" placeholder="Retapez votre mot de passe" required minlength="6">
                </div>
                <button type="submit" class="login-btn" id="signup-submit">Creer mon compte</button>
            </form>

            <p class="login-toggle" id="login-toggle">
                Pas encore de compte ? <a href="#" id="toggle-link">Creer un compte</a>
            </p>
        </div>

        <footer>
            <p class="footer-text">Impulsion - Transitions Pro PACA</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script>
        // Si déjà connecté, rediriger
        (async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                window.location.href = 'crm.html';
                return;
            }
        })();

        const errorDiv = document.getElementById('login-error');
        const successDiv = document.getElementById('login-success');

        function showError(msg) {
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
            successDiv.style.display = 'none';
        }
        function hideMessages() {
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
        }

        // Toggle connexion / inscription
        let isSignup = false;
        document.getElementById('toggle-link').addEventListener('click', (e) => {
            e.preventDefault();
            isSignup = !isSignup;
            hideMessages();
            document.getElementById('login-form').style.display = isSignup ? 'none' : 'block';
            document.getElementById('signup-form').style.display = isSignup ? 'block' : 'none';
            document.getElementById('login-subtitle').textContent = isSignup
                ? 'Creez votre compte referent'
                : 'Connectez-vous pour acceder a l\'outil';
            document.getElementById('toggle-link').textContent = isSignup
                ? 'Se connecter'
                : 'Creer un compte';
            document.getElementById('login-toggle').childNodes[0].textContent = isSignup
                ? 'Deja un compte ? '
                : 'Pas encore de compte ? ';
        });

        // Connexion
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const submitBtn = document.getElementById('login-submit');

            hideMessages();
            submitBtn.disabled = true;
            submitBtn.textContent = 'Connexion...';

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) throw error;
                window.location.href = 'crm.html';
            } catch (err) {
                showError('Identifiants incorrects. Verifiez votre e-mail et mot de passe.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Se connecter';
            }
        });

        // Inscription
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nom = document.getElementById('signup-nom').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value;
            const passwordConfirm = document.getElementById('signup-password-confirm').value;
            const submitBtn = document.getElementById('signup-submit');

            hideMessages();

            if (password !== passwordConfirm) {
                showError('Les mots de passe ne correspondent pas.');
                return;
            }

            if (password.length < 6) {
                showError('Le mot de passe doit contenir au moins 6 caracteres.');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Creation du compte...';

            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email,
                    password,
                    options: {
                        data: { nom: nom, role: 'referent' }
                    }
                });
                if (error) throw error;

                // Si la confirmation email est activée
                if (data.user && !data.session) {
                    successDiv.textContent = 'Compte cree ! Verifiez votre boite mail pour confirmer votre adresse, puis connectez-vous.';
                    successDiv.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Creer mon compte';
                } else {
                    // Auto-confirm activé : connexion directe
                    window.location.href = 'crm.html';
                }
            } catch (err) {
                const msg = err.message === 'User already registered'
                    ? 'Un compte existe deja avec cette adresse e-mail.'
                    : 'Erreur lors de la creation du compte. Reessayez.';
                showError(msg);
                submitBtn.disabled = false;
                submitBtn.textContent = 'Creer mon compte';
            }
        });
    </script>
</body>
</html>
