<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Impulsion</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            max-width: 420px;
            margin: 80px auto;
            padding: 40px 32px;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
        }
        .login-container h1 {
            font-size: 1.3rem;
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 8px;
        }
        .login-subtitle {
            text-align: center;
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 28px;
        }
        .login-field {
            margin-bottom: 16px;
        }
        .login-field label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 6px;
        }
        .login-field input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        .login-field input:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s;
            margin-top: 8px;
        }
        .login-btn:hover {
            background: var(--primary-dark);
        }
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .login-error {
            display: none;
            padding: 10px 14px;
            background: #fee2e2;
            border: 1px solid #fca5a5;
            border-radius: 6px;
            color: #991b1b;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 20px;
        }
        .login-logo img {
            max-width: 180px;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-container">
            <div class="login-logo">
                <img src="https://www.transitionspro-paca.fr/wp-content/uploads/2021/04/logo-transitions-pro-paca.png"
                     alt="Transitions Pro PACA">
            </div>
            <h1>Impulsion</h1>
            <p class="login-subtitle">Connectez-vous pour acceder a l'outil</p>

            <div class="login-error" id="login-error"></div>

            <form id="login-form">
                <div class="login-field">
                    <label for="login-email">Adresse e-mail</label>
                    <input type="email" id="login-email" placeholder="votre.email@transitionspro-paca.fr" required autofocus>
                </div>
                <div class="login-field">
                    <label for="login-password">Mot de passe</label>
                    <input type="password" id="login-password" placeholder="Votre mot de passe" required>
                </div>
                <button type="submit" class="login-btn" id="login-submit">Se connecter</button>
            </form>
        </div>

        <footer>
            <p class="footer-text">Impulsion - Transitions Pro PACA</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script>
        // Si déjà connecté, rediriger
        (async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                window.location.href = 'crm.html';
                return;
            }
        })();

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('login-error');
            const submitBtn = document.getElementById('login-submit');

            errorDiv.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Connexion...';

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) throw error;
                window.location.href = 'crm.html';
            } catch (err) {
                errorDiv.textContent = 'Identifiants incorrects. Verifiez votre e-mail et mot de passe.';
                errorDiv.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Se connecter';
            }
        });
    </script>
</body>
</html>
